</div><div class="relative mb-4">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]">search</span>
<input class="w-full pl-10 pr-4 h-10 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary bg-surface-container-lowest outline-none transition-all font-body-sm text-body-sm" placeholder="Cari produk..." type="text">
</div>
<!-- Compact Product List -->
<div class="grid grid-cols-2 gap-2">
<!-- Cuci Lipat -->
<label class="cursor-pointer block">
<input checked="" class="hidden peer" name="product" type="radio">

</a>

<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>

<script>
        // Micro-interactions and calculation logic
        const weightInput = document.getElementById('weight-input');
        const plusBtn = document.getElementById('plus-btn');
        const minusBtn = document.getElementById('minus-btn');
        const totalPriceEl = document.getElementById('total-price');
        const paymentToggle = document.getElementById('payment-toggle');
        const toggleCircle = document.getElementById('toggle-circle');
        const paymentLabel = document.getElementById('payment-label');

        const updatePrice = () => {
            const weight = parseFloat(weightInput.value);
            const basePrice = 10000;
            const expressFee = 2500;
            const total = (weight * basePrice) + (weight * expressFee);
            totalPriceEl.textContent = total.toLocaleString('id-ID');
        };

        plusBtn.addEventListener('click', () => {
            weightInput.value = (parseFloat(weightInput.value) + 0.5).toFixed(1);
            updatePrice();
        });

        minusBtn.addEventListener('click', () => {
            if (parseFloat(weightInput.value) > 0.5) {
                weightInput.value = (parseFloat(weightInput.value) - 0.5).toFixed(1);
                updatePrice();
            }
        });

        weightInput.addEventListener('input', updatePrice);

        let isPaid = false;
        paymentToggle.addEventListener('click', () => {
            isPaid = !isPaid;
            if (isPaid) {
                paymentToggle.classList.replace('bg-pending', 'bg-success');
                toggleCircle.classList.add('translate-x-6');
                paymentLabel.textContent = 'LUNAS';
                paymentLabel.classList.replace('text-secondary', 'text-success');
            } else {
                paymentToggle.classList.replace('bg-success', 'bg-pending');
                toggleCircle.classList.remove('translate-x-6');
                paymentLabel.textContent = 'BELUM LUNAS';
                paymentLabel.classList.replace('text-success', 'text-secondary');
            }
        });

        // Add some atmospheric shadow logic on scroll for the TopAppBar
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-md');
            } else {
                header.classList.remove('shadow-md');
            }
        });
    </script>
