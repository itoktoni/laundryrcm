<script>
        function increment(id) {
            const input = document.getElementById(id + '-input');
            input.value = parseInt(input.value) + 1;
            animateScale(input.parentElement);
        }

        function decrement(id) {
            const input = document.getElementById(id + '-input');
            if(parseInt(input.value) > 0) {
                input.value = parseInt(input.value) - 1;
                animateScale(input.parentElement);
            }
        }

        function animateScale(el) {
            el.classList.add('scale-105');
            setTimeout(() => el.classList.remove('scale-105'), 100);
        }

        // Add visual feedback to checkboxes and radios
        document.querySelectorAll('input[type="checkbox"], input[type="radio"]').forEach(input => {
            input.addEventListener('change', function() {
                const parent = this.closest('label');
                if(parent && this.type === 'checkbox') {
                    if(this.checked) {
                        parent.classList.add('bg-secondary-container', 'border-primary');
                    } else {
                        parent.classList.remove('bg-secondary-container', 'border-primary');
                    }
                }
            });
        });
    </script>
